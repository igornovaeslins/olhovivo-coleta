name: coleta-olhovivo

on:
  schedule:
    - cron: '*/5 * * * *'      # mínimo nativo do GitHub; o loop interno dá 1 min
  workflow_dispatch:            # permite disparo manual (teste)

permissions:
  contents: write               # necessário pro bot commitar o dado

concurrency:
  group: coleta-olhovivo        # serializa: nunca dois jobs colidindo no push
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    env:
      OLHOVIVO_DIR: ${{ github.workspace }}
      SPTRANS_TOKEN: ${{ secrets.SPTRANS_TOKEN }}
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      R_LIBS_USER: ${{ github.workspace }}/.rlib
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true     # binários Linux (instalação rápida)

      - name: Preparar lib e cache
        run: mkdir -p "$R_LIBS_USER"
      - uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: rlib-${{ runner.os }}-httr-jsonlite-datatable-v1

      - name: Instalar deps R (só se faltarem)
        run: Rscript -e 'p<-c("httr","jsonlite","data.table"); n<-p[!p %in% rownames(installed.packages())]; if(length(n)) install.packages(n)'

      - name: Coletar (loop 5x60s = 1 min) + velocidade perto de :00 e :30
        run: |
          D="$OLHOVIVO_DIR/data-raw/olhovivo"; mkdir -p "$D"
          antes=$(ls "$D"/posicao_*.csv.gz 2>/dev/null | wc -l)
          for i in 1 2 3 4 5; do
            Rscript R/16_olhovivo_coleta.R || true
            M=$(date +%M)
            if [ "$M" -lt 5 ] || { [ "$M" -ge 30 ] && [ "$M" -lt 35 ]; }; then
              Rscript R/17_olhovivo_velocidade.R || true
            fi
            if [ "$i" -lt 5 ]; then sleep 60; fi
          done
          depois=$(ls "$D"/posicao_*.csv.gz 2>/dev/null | wc -l)
          if [ "$depois" -le "$antes" ]; then
            curl -s -H "Title: Olho Vivo nuvem: run sem dado" \
                 -d "Coleta vazia em $(date -u). Token expirado ou API fora?" \
                 "https://ntfy.sh/$NTFY_TOPIC" || true
          fi

      - name: Commitar dado
        run: |
          git config user.name "olhovivo-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data-raw/olhovivo
          if git diff --cached --quiet; then
            echo "nada novo pra commitar"
          else
            git commit -m "coleta $(date -u +%Y%m%dT%H%M%S)"
            git pull --rebase --autostash || true
            git push
          fi

      - name: Alerta se o workflow falhar
        if: failure()
        run: |
          curl -s -H "Title: Olho Vivo nuvem: WORKFLOW FALHOU" \
               -d "Run $GITHUB_RUN_ID falhou em $(date -u)" \
               "https://ntfy.sh/$NTFY_TOPIC" || true
